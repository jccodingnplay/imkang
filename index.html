<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON BEATS — ASDF 리듬게임</title>
  <meta name="description" content="ASDF 4키 리듬게임. NCS 스타일 전자음악과 함께하는 사이버펑크 리듬게임." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 배경 파티클 캔버스 -->
  <canvas id="bg-canvas"></canvas>

  <!-- 메인 메뉴 -->
  <div id="menu-screen" class="screen active">
    <div class="menu-glow-ring"></div>
    <div class="menu-content">
      <div class="logo-container">
        <div class="logo-subtitle">CYBER RHYTHM</div>
        <h1 class="logo-title">NEON<br/><span class="logo-accent">BEATS</span></h1>
        <div class="logo-version">v1.0 — ASDF 4KEY</div>
      </div>

      <div class="song-select-container">
        <h2 class="section-title">곡 선택</h2>
        <div class="song-list" id="song-list">
          <!-- JS로 동적 생성 -->
        </div>
      </div>

      <div class="difficulty-select">
        <h2 class="section-title">난이도</h2>
        <div class="diff-buttons">
          <button class="diff-btn active" data-diff="easy" id="diff-easy">EASY</button>
          <button class="diff-btn" data-diff="normal" id="diff-normal">NORMAL</button>
          <button class="diff-btn" data-diff="hard" id="diff-hard">HARD</button>
        </div>
      </div>

      <button class="start-btn" id="start-btn">
        <span class="start-btn-text">게임 시작</span>
        <div class="start-btn-glow"></div>
      </button>

      <div class="controls-hint">
        <span class="key-hint">A</span>
        <span class="key-hint">S</span>
        <span class="key-hint">D</span>
        <span class="key-hint">F</span>
        <span class="hint-text">키를 눌러 노트를 처리하세요</span>
      </div>
    </div>
  </div>

  <!-- 게임 화면 -->
  <div id="game-screen" class="screen">
    <!-- 상단 HUD -->
    <div class="hud">
      <div class="hud-left">
        <div class="song-info">
          <div class="song-name" id="hud-song-name">—</div>
          <div class="song-artist" id="hud-song-artist">—</div>
        </div>
      </div>
      <div class="hud-center">
        <div class="score-display">
          <div class="score-label">SCORE</div>
          <div class="score-value" id="score-value">0</div>
        </div>
        <div class="combo-display" id="combo-display">
          <div class="combo-value" id="combo-value">0</div>
          <div class="combo-label">COMBO</div>
        </div>
      </div>
      <div class="hud-right">
        <div class="accuracy-display">
          <div class="accuracy-label">ACCURACY</div>
          <div class="accuracy-value" id="accuracy-value">100.00%</div>
        </div>
        <button class="pause-btn" id="pause-btn">⏸</button>
      </div>
    </div>

    <!-- 프로그레스 바 -->
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- 게임 캔버스 영역 -->
    <div class="game-area">
      <canvas id="game-canvas"></canvas>

      <!-- 레인 키 표시 -->
      <div class="lane-keys" id="lane-keys">
        <div class="lane-key" id="key-a" data-key="A">A</div>
        <div class="lane-key" id="key-s" data-key="S">S</div>
        <div class="lane-key" id="key-d" data-key="D">D</div>
        <div class="lane-key" id="key-f" data-key="F">F</div>
      </div>

      <!-- 판정 표시 -->
      <div class="judgment-display" id="judgment-display"></div>

      <!-- 파티클 컨테이너 -->
      <div class="particles-container" id="particles-container"></div>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="result-screen" class="screen">
    <div class="result-content">
      <div class="result-grade" id="result-grade">S</div>
      <h2 class="result-title">STAGE CLEAR</h2>
      <div class="result-song-name" id="result-song-name">—</div>

      <div class="result-stats">
        <div class="stat-item">
          <div class="stat-label">SCORE</div>
          <div class="stat-value" id="result-score">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">ACCURACY</div>
          <div class="stat-value" id="result-accuracy">0%</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">MAX COMBO</div>
          <div class="stat-value" id="result-combo">0</div>
        </div>
      </div>

      <div class="result-breakdown">
        <div class="breakdown-item perfect">
          <span class="breakdown-label">PERFECT</span>
          <span class="breakdown-value" id="result-perfect">0</span>
        </div>
        <div class="breakdown-item good">
          <span class="breakdown-label">GOOD</span>
          <span class="breakdown-value" id="result-good">0</span>
        </div>
        <div class="breakdown-item miss">
          <span class="breakdown-label">MISS</span>
          <span class="breakdown-value" id="result-miss">0</span>
        </div>
      </div>

      <div class="result-buttons">
        <button class="result-btn retry-btn" id="retry-btn">다시 하기</button>
        <button class="result-btn menu-btn" id="menu-btn-result">메뉴로</button>
      </div>
    </div>
  </div>

  <!-- 일시정지 오버레이 -->
  <div id="pause-overlay" class="overlay hidden">
    <div class="pause-content">
      <h2 class="pause-title">PAUSED</h2>
      <button class="pause-menu-btn" id="resume-btn">계속하기</button>
      <button class="pause-menu-btn secondary" id="quit-btn">메뉴로 나가기</button>
    </div>
  </div>

  <!-- 카운트다운 -->
  <div id="countdown-overlay" class="overlay hidden">
    <div class="countdown-number" id="countdown-number">3</div>
  </div>

  <script src="audio.js"></script>
  <script src="beatmaps.js"></script>
  <script src="game.js"></script>
</body>
</html>
